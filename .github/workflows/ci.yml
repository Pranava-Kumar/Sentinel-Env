name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "latest"

# Prevent concurrent deployments
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run ruff linter
        run: uv run ruff check .

      - name: Run ruff formatter
        run: uv run ruff format --check .

  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    continue-on-error: true  # Non-blocking for now
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run mypy
        run: uv run mypy server/ tests/ inference.py client.py models.py --ignore-missing-imports --no-error-summary

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ -v --tb=short \
            --cov=server --cov=. \
            --cov-report=xml --cov-report=html \
            --ignore=tests/test_garak_integration.py

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 30

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run bandit security scan
        run: uv run bandit -r server/ -f json -o bandit-report.json || true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: bandit-report.json
          retention-days: 30

  validate-inference:
    name: Validate Inference Script
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Validate inference.py has no syntax errors
        run: uv run python -c "import py_compile; py_compile.compile('inference.py', doraise=True)"

      - name: Validate inference.py env var defaults
        run: |
          # Ensure inference.py runs without any env vars set (except HF_TOKEN)
          uv run python -c "
          import os
          # Clear all optional env vars
          for key in ['TASK_NAME', 'BENCHMARK', 'MAX_STEPS', 'BASE_URL', 'LOCAL_IMAGE_NAME', 'API_BASE_URL', 'MODEL_NAME', 'EVAL_SEED']:
              os.environ.pop(key, None)
          # Set minimal required
          os.environ['HF_TOKEN'] = 'hf_test_token_for_syntax_check'
          os.environ['BASE_URL'] = 'http://localhost:7860'
          # Import and verify defaults are set
          import inference
          assert inference.TASK_NAME == 'basic-injection'
          assert inference.BENCHMARK == 'sentinel-env'
          assert inference.MAX_STEPS == 20
          assert inference.EVAL_SEED == 42
          print('All defaults validated successfully')
          "

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, security, validate-inference]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: sentinel-env:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-hf:
    name: Deploy to Hugging Face Spaces
    runs-on: ubuntu-latest
    needs: [test, security, validate-inference]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -n "$HF_TOKEN" ] && [ -f deploy-hf-now.py ]; then
            uv run python deploy-hf-now.py 2>&1 || echo "Deployment completed with warnings"
          else
            echo "Skipping HF deployment: no token or no deploy script"
          fi
